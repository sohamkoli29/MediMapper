<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Analysis</title>
    <link rel="stylesheet" href="Report.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav>
            <button>HOME</button>
            <button>HELP</button>
            <button>ABOUT</button>
            <button>CONTACT US</button>
        </nav>
        <div class="login">
            <button>LOGIN/SIGN IN</button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <h1>Report Analysis</h1>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" placeholder="Enter the type of the test">
        </div>

        <!-- Upload Report Button -->
        <div class="upload-section">
            <label for="report-upload" class="upload-btn">Upload Report</label>
            <input type="file" id="report-upload" accept=".pdf,.docx,.txt">
        </div>

        <!-- Output Section -->
        <div class="output-section">
            <label>Output/Conclusion:</label>
            <textarea readonly></textarea>
        </div>
    </main>

</body>
</html>
