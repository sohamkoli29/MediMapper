        <div id="chatbot-modal" class="fixed bottom-20 right-6 w-80 bg-white shadow-2xl rounded-lg hidden">

            </div>

                <input type="text" id="chat-input" placeholder="Type a message..." class="w-3/4 p-2 border rounded-lg outline-none">
                <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Send Message</button>
                <button id="clear-chat-btn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 ml-2">Clear Chat</button>
